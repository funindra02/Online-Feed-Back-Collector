<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}FeedbackHub{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  {% block extra_head %}{% endblock %}
</head>
<body>
  <nav class="navbar">
    <a href="/" class="nav-brand">
      <span class="brand-icon">◈</span>
      FeedbackHub
    </a>
    <div class="nav-links">
      <a href="/" class="nav-link {% if request.endpoint == 'index' %}active{% endif %}">Submit Feedback</a>
      {% if session.get('admin_logged_in') %}
        <a href="/admin-dashboard" class="nav-link {% if request.endpoint == 'admin_dashboard' %}active{% endif %}">Dashboard</a>
        <a href="/admin/logout" class="nav-link nav-logout">Logout</a>
      {% else %}
        <a href="/admin/login" class="nav-link">Admin</a>
      {% endif %}
    </div>
  </nav>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <p>FeedbackHub &copy; 2024 — Built with Flask &amp; SQLite</p>
  </footer>

  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
